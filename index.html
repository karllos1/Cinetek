<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>CINETEK ULTIMATE V100</title>
    <style>
        :root { --red: #E50914; --bg: #050505; --text: #ffffff; }
        
        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* CABEÇALHO */
        header {
            background: rgba(0,0,0,0.95); height: 70px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 5%; position: fixed; width: 100%; top: 0; z-index: 5000; box-sizing: border-box;
            border-bottom: 1px solid #222;
        }
        
        .btn-menu-novo { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .search-container {
            display: flex; align-items: center; background: #1a1a1a; border-radius: 25px;
            padding: 5px 15px; flex: 1; max-width: 300px; margin: 0 10px; border: 1px solid #333;
        }
        .search-container input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 14px; }

        /* BANNER */
        #hero-slider {
            width: 100%; height: 65vh; background-size: cover; background-position: top center; 
            transition: 1.5s ease-in-out; position: relative; display: flex; 
            align-items: flex-end; padding: 60px 5%; box-sizing: border-box;
        }
        #hero-slider::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg) 10%, transparent 70%);
        }

        /* MENU LATERAL */
        #menu-lat {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: #000; z-index: 9999; transition: 0.4s; padding: 40px 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        #menu-lat.active { left: 0; }
        .menu-item { display: block; width: 100%; padding: 15px; color: white; background: none; border: none; text-align: left; cursor: pointer; font-size: 17px; border-bottom: 1px solid #111; }

        /* GRADES */
        .secao-tit { padding: 25px 5% 10px; font-size: 1.3rem; color: var(--red); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 10px 5%; }
        .card { cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; border-radius: 8px; aspect-ratio: 2/3; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card p { margin: 8px 0; font-size: 12px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* DETALHES */
        #detalhes-page {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 8000;
            overflow-y: auto; padding-top: 80px; background-size: cover; background-position: center;
        }
        .detalhes-overlay {
            position: absolute; top: 0; left: 0; width: 100%; min-height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.85) 0%, rgba(5,5,5,1) 100%);
            z-index: -1; backdrop-filter: blur(10px);
        }
        .det-flex { display: flex; gap: 30px; padding: 20px 5%; max-width: 1100px; margin: 0 auto; flex-wrap: wrap; position: relative; }
        .det-poster-img { width: 250px; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.9); border: 1px solid #333; }
        .det-info { flex: 1; min-width: 300px; }

        .player-wrap { width: 100%; max-width: 900px; margin: 20px 0; display: none; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px var(--red); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .ep-list { display: grid; gap: 10px; margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .ep-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }

        .sinopse-container { font-size: 16px; line-height: 1.8; color: #eee; margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 10px; }
        .btn-play { background: var(--red); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* BOTÃO FAVORITO */
        .btn-fav { background: #222; color: white; border: 1px solid #444; padding: 12px 18px; border-radius: 50px; cursor: pointer; font-size: 20px; transition: 0.3s; margin-left: 10px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-fav.active { color: #ff0000; border-color: #ff0000; }

        .modal-admin { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; padding: 20px; overflow-y: auto; }
        .admin-box { background: #111; max-width: 450px; margin: 30px auto; padding: 25px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .close-admin { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

        @media (max-width: 768px) {
            .logo-txt { display: none; }
            #hero-slider { height: 45vh; }
            .det-flex { flex-direction: column; text-align: center; }
            .det-poster-img { width: 100%; max-width: 180px; margin: 0 auto; }
        }
        /* Estilo para o botão de remover favorito na grade */
.card-fav-remove {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(229, 9, 20, 0.9);
    color: white;
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    cursor: pointer;
    font-weight: bold;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}
    </style>
</head>
<body>

<header>

    <div class="search-container">

        <span onclick="pesquisaGeral()" style="cursor:pointer">🔍</span>

<div id="hero-slider">

</div>

<div id="home">
    <div id="section-continuar" style="display:none;">
        <h2 class="secao-tit" style="color: #00d4ff;">⏳ Continuar Assistindo</h2>

</div>

<div id="menu-lat">
    <button onclick="toggleMenu(false)" style="color:var(--red); background:none; border:none; font-size:35px; cursor:pointer;">✕</button>
    <button class="menu-item" onclick="location.reload()">🏠 Página Inicial</button>
    <button class="menu-item" onclick="mostrarFavoritos()">❤️ Meus Favoritos</button>
    <button class="menu-item" onclick="buscarGen(0, 'movie')">🎬 Filmes</button>
    <button class="menu-item" onclick="buscarGen(0, 'tv')">📺 Séries</button>
    <button class="menu-item" onclick="buscarGen(28, 'movie')">💥 Ação</button>
    <button class="menu-item" onclick="buscarGen(27, 'movie')">💀 Terror</button>
    <button class="menu-item" onclick="buscarGen(35, 'movie')">😂 Comédia</button>
    <button class="menu-item" onclick="buscarGen(16, 'movie')">🎨 Desenhos</button>
    <button class="menu-item" onclick="buscarGen(10749, 'movie')">💖 Romance</button>
    <button class="menu-item" onclick="buscarGen(878, 'movie')">🚀 Ficção</button>
</div>

<div id="detalhes-page">
    <div class="detalhes-overlay"></div>
    <div class="det-flex">
        <img id="det-poster" class="det-poster-img" src="">
        <div class="det-info">
            <h1 id="det-tit" style="font-size: 2.5rem; margin: 0; text-shadow: 2px 2px 10px #000;"></h1>
            <p id="det-meta" style="color:var(--red); font-weight:bold; margin-top: 10px;"></p>
            <div id="det-views" style="font-size: 14px; color: #aaa; margin-top: 5px;">👁️ 0 visualizações</div>
            <div id="player-box" class="player-wrap"><video id="main-video" controls playsinline></video></div>
            <div id="actions-area" style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
                <button id="btn-play-trigger" class="btn-play">▶ ASSISTIR AGORA</button>
                <button id="btn-fav-trigger" class="btn-fav" onclick="toggleFavorito()">♡</button>
            </div>
            <div id="series-area" style="display:none; margin-top: 20px;">
                <h3 style="margin-bottom: 10px;">Temporadas e Episódios</h3>
                <select id="select-temp" class="admin-input" style="max-width: 200px;" onchange="carregarEpisodios()"></select>
                <div id="ep-list" class="ep-list"></div>
            </div>
            <div id="det-sinopse" class="sinopse-container"></div>
            <h3 class="secao-tit" style="padding-left: 0;">🎥 Títulos Semelhantes</h3>
            <div class="grid" id="grid-semelhantes" style="padding: 10px 0;"></div>
        </div>
    </div>
    <button onclick="fecharDet()" style="position:fixed; top:20px; right:20px; background:var(--red); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; z-index:9000; font-weight: bold;">✕</button>
</div>

<div id="admin-modal" class="modal-admin">
    <div class="admin-box" style="max-width: 550px;"> <button class="close-admin" onclick="fecharAdmin()">✕</button>
        <div id="adm-login-area">
            <h2 style="text-align:center; color: var(--red);">CINETEK ADMIN</h2>
            <input type="text" id="adm-user" class="admin-input" placeholder="Usuário">
            <input type="password" id="adm-pass" class="admin-input" placeholder="Senha" onkeyup="if(event.key==='Enter') login()">
            <button onclick="login()" class="btn-play" style="width:100%; justify-content:center;">ENTRAR</button>
        </div>
        <div id="adm-painel" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <h3 style="margin:0;">Dashboard</h3>
                <div style="display:flex; gap:10px;">
                    <button onclick="toggleTrocarSenha()" style="background:none; border:1px solid #444; color:#aaa; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:11px;">🔑 Senha</button>
                    <button onclick="location.reload()" style="color:var(--red); background:none; border:none; cursor:pointer; font-weight: bold;">SAIR</button>
                </div>
            </div>
            <div id="area-trocar-senha" style="display:none; background:#1a1a1a; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid var(--red);">
                <p style="font-size:12px; color:#fff; margin-bottom:10px;">Nova Senha Admin:</p>
                <input type="text" id="nova-senha-input" class="admin-input" placeholder="Digite a nova senha">
                <button onclick="confirmarTrocaSenha()" class="btn-play" style="width:100%; padding:10px; font-size:12px;">SALVAR NOVA SENHA</button>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="setTipo('movie')" id="btn-m" style="flex:1; padding:12px; background:var(--red); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">🎬 FILMES</button>
                <button onclick="setTipo('tv')" id="btn-t" style="flex:1; padding:12px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">📺 SÉRIES</button>
            </div>
            <div style="background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222;">
                <p style="font-size: 11px; color: #888; margin: 0 0 8px 0;">1. BUSCAR NO TMDB:</p>
                <input type="text" id="adm-busca" class="admin-input" placeholder="Ex: Suits..." oninput="buscarTMDB()">
                <div id="res-busca-adm" style="max-height:150px; overflow-y:auto; background:#111; border-radius: 4px;"></div>
            </div>
            <div id="sessao-links" style="background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222;">
                <p style="font-size: 11px; color: #888; margin: 0 0 8px 0;">2. CONFIGURAR VÍDEO:</p>
                <div id="campos-serie" style="display:none; gap:10px; margin-bottom:10px;">
                    <input type="number" id="adm-temp" class="admin-input" placeholder="Temp" oninput="carregarLinkEdicao()" style="width:70px;">
                    <input type="number" id="adm-ep" class="admin-input" placeholder="EP" oninput="carregarLinkEdicao()" style="width:70px;">
                </div>
                <input type="text" id="ed-link" class="admin-input" placeholder="Link .mp4 do vídeo">
                <button onclick="salvar()" class="btn-play" style="width:100%; justify-content:center; height: 50px; font-size: 16px;">🚀 PUBLICAR AGORA</button>
                <div style="margin-top: 25px; border-top: 1px solid #333; padding-top: 15px;">
                    <h4 style="font-size:13px; color:#888; margin-bottom: 10px;">📂 CONTEÚDOS NO AR</h4>
                    <div id="lista-gerenciar" style="max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DATABASE_URL = "https://cinetek-db692-default-rtdb.firebaseio.com/.json"; 
    const API_KEY = "6442432c527127fa62c7fe3b9774b7eb";

    let db = { movie:{}, tv:{}, recentes:[], config:{user:'admin', pass:'1234'} };
    let tipoAtual = 'movie'; let selecionado = null; let sliderItems = [];

    async function carregarBancoNuvem() {
        try {
            const r = await fetch(DATABASE_URL);
            const dados = await r.json();
            if (dados) { db = dados; render(db.recentes || [], 'grid-recentes'); }
        } catch (e) { console.error("Erro banco"); }
    }

    async function salvarNaNuvem() {
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(db) });
    }

    async function init() {
        await carregarBancoNuvem();
        renderContinuar();
        const r = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`);
        const d = await r.json(); sliderItems = d.results.slice(0, 8);
        render(d.results, 'main-grid'); startSlider();
    }

    function startSlider() {
        let idx = 0; setInterval(() => {
            const m = sliderItems[idx]; if(m) {
                document.getElementById('hero-slider').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
                document.getElementById('hero-tit').innerText = m.title || m.name; idx = (idx + 1) % sliderItems.length;
            }
        }, 6000);
    }

    function render(lista, container) {
    const div = document.getElementById(container); 
    if(!div) return; // Segurança caso o container não exista
    div.innerHTML = ""; // Isso limpa o "Carregando..." ou filmes anteriores
    lista.forEach(m => {
        if(!m.poster_path) return;
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><p>${m.title || m.name}</p>`;
        card.onclick = () => abrirDet(m); div.appendChild(card);
    });
}

   async function abrirDet(m) {
    selecionado = m; 
    const tipo = m.name ? 'tv' : 'movie';
    const page = document.getElementById('detalhes-page');
    
    page.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
    document.getElementById('det-tit').innerText = m.title || m.name;
    document.getElementById('det-poster').src = `https://image.tmdb.org/t/p/w500${m.poster_path}`;
    document.getElementById('det-meta').innerText = `⭐ ${m.vote_average.toFixed(1)} | ${m.release_date || m.first_air_date || ""}`;
    document.getElementById('det-sinopse').innerText = m.overview || "Sinopse não disponível.";
    
    // Lógica do botão de favoritos (Coração)
    const favs = JSON.parse(localStorage.getItem('cinetek_favs') || '[]');
    const isFav = favs.some(f => f.id == m.id);
    const btnFav = document.getElementById('btn-fav-trigger');
    if(btnFav) {
        btnFav.innerHTML = isFav ? '❤️' : '♡';
        btnFav.classList.toggle('active', isFav);
    }

    const views = (db[tipo] && db[tipo][m.id] && db[tipo][m.id].views) ? db[tipo][m.id].views : 0;
    document.getElementById('det-views').innerText = `👁️ ${views} visualizações`;

    const pBox = document.getElementById('player-box'); 
    const sArea = document.getElementById('series-area'); 
    const btnPlay = document.getElementById('btn-play-trigger');
    
    pBox.style.display = 'none'; 
    sArea.style.display = 'none';
    document.getElementById('main-video').src = "";

    if(tipo === 'tv') {
        btnPlay.style.display = 'none'; 
        sArea.style.display = 'block'; 
        carregarTemporadas(m.id);
    } else {
        btnPlay.style.display = 'inline-flex';
        btnPlay.onclick = () => {
            if(db.movie && db.movie[m.id] && db.movie[m.id].link) { 
                pBox.style.display = 'block'; 
                document.getElementById('main-video').src = db.movie[m.id].link; 
                btnPlay.style.display = 'none';
                pBox.scrollIntoView({ behavior: 'smooth' });
                registrarView(m.id, 'movie');
            } else {
                alert("Este filme ainda não possui um link cadastrado.");
            }
        };
    }

    const rs = await fetch(`https://api.themoviedb.org/3/${tipo}/${m.id}/similar?api_key=${API_KEY}&language=pt-BR`);
    const ds = await rs.json(); 
    render(ds.results.slice(0, 6), 'grid-semelhantes');
    
    page.style.display = 'block'; 
    page.scrollTo(0, 0);
}

    async function carregarTemporadas(id) {
        const r = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=pt-BR`);
        const d = await r.json(); document.getElementById('select-temp').innerHTML = d.seasons.map(s => `<option value="${s.season_number}">${s.name}</option>`).join('');
        carregarEpisodios();
    }

    async function carregarEpisodios() {
        const s = document.getElementById('select-temp').value;
        const r = await fetch(`https://api.themoviedb.org/3/tv/${selecionado.id}/season/${s}?api_key=${API_KEY}&language=pt-BR`);
        const d = await r.json();
        document.getElementById('ep-list').innerHTML = d.episodes.map(e => `
            <div class="ep-card" onclick="tocarEp('${selecionado.id}', '${s}', '${e.episode_number}')">
                <b>EP ${e.episode_number}</b> - ${e.name}
            </div>
        `).join('');
    }

    async function registrarView(id, tipo) {
        if (!db[tipo] || !db[tipo][id]) return;
        if (!db[tipo][id].views) db[tipo][id].views = 0;
        db[tipo][id].views += 1;
        document.getElementById('det-views').innerText = `👁️ ${db[tipo][id].views} visualizações`;
        await salvarNaNuvem();
    }

    function tocarEp(idSerie, numTemp, numEp) {
        if (db.tv && db.tv[idSerie] && db.tv[idSerie].temporadas && 
            db.tv[idSerie].temporadas[numTemp] && db.tv[idSerie].temporadas[numTemp][numEp]) {
            
            const linkEp = db.tv[idSerie].temporadas[numTemp][numEp];
            const pBox = document.getElementById('player-box');
            const video = document.getElementById('main-video');

            pBox.style.display = 'block';
            video.src = linkEp;
            video.play();
            pBox.scrollIntoView({ behavior: 'smooth' });
            
            registrarView(idSerie, 'tv');
        } else {
            alert("O link para este episódio ainda não foi cadastrado.");
        }
    }

    // LÓGICA FAVORITOS
    function toggleFavorito() {
        let favs = JSON.parse(localStorage.getItem('cinetek_favs') || '[]');
        const idx = favs.findIndex(f => f.id == selecionado.id);
        const btnFav = document.getElementById('btn-fav-trigger');

        if(idx > -1) {
            favs.splice(idx, 1);
            btnFav.innerHTML = '♡';
            btnFav.classList.remove('active');
        } else {
            favs.push(selecionado);
            btnFav.innerHTML = '❤️';
            btnFav.classList.add('active');
        }
        localStorage.setItem('cinetek_favs', JSON.stringify(favs));
    }

    function mostrarFavoritos() {
    toggleMenu(false); 
    const favs = JSON.parse(localStorage.getItem('cinetek_favs') || '[]');
    
    const container = document.getElementById('main-grid');
    const mainTit = document.getElementById('main-tit');
    
    // 1. Limpeza total da tela para focar nos favoritos
    container.innerHTML = "";
    mainTit.innerText = "❤️ MEUS FAVORITOS";
    
    // Esconde o slider, a seção continuar e os recentes
    document.getElementById('hero-slider').style.display = 'none';
    const secCont = document.getElementById('section-continuar');
    if(secCont) secCont.style.display = 'none';
    
    // Esconde a seção de recentes (Título e Grid)
    const recGrid = document.getElementById('grid-recentes');
    if(recGrid) {
        recGrid.style.display = 'none';
        if(recGrid.previousElementSibling) recGrid.previousElementSibling.style.display = 'none';
    }

    // 2. Renderizar os cards de favoritos com botão de remover
    if(favs.length === 0) {
        container.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                <p style="font-size: 1.2rem; color: #666;">Sua lista de favoritos está vazia.</p>
                <button onclick="location.reload()" style="margin-top:20px; background:var(--red); color:white; border:none; padding:12px 25px; border-radius:50px; cursor:pointer; font-weight:bold;">VOLTAR AO INÍCIO</button>
            </div>`;
    } else {
        favs.forEach((m, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.position = 'relative';
            
            card.innerHTML = `
                <button class="card-fav-remove" onclick="removerDosFavoritosRapido(event, ${m.id})">✕</button>
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                <p>${m.title || m.name}</p>
            `;
            
            card.onclick = () => abrirDet(m);
            container.appendChild(card);
        });
    }
    window.scrollTo(0, 0);
}

// Nova função para remover sem precisar abrir o filme
function removerDosFavoritosRapido(event, id) {
    event.stopPropagation(); // Impede de abrir os detalhes ao clicar no X
    let favs = JSON.parse(localStorage.getItem('cinetek_favs') || '[]');
    favs = favs.filter(f => f.id != id);
    localStorage.setItem('cinetek_favs', JSON.stringify(favs));
    mostrarFavoritos(); // Atualiza a tela na hora
}

    // LÓGICA CONTINUAR ASSISTINDO
    const videoElement = document.getElementById('main-video');
    videoElement.ontimeupdate = () => {
        if (videoElement.currentTime > 10 && selecionado) {
            salvarProgresso(selecionado, videoElement.currentTime);
        }
    };

    function salvarProgresso(m, tempo) {
        let progresso = JSON.parse(localStorage.getItem('cinetek_progresso') || '{}');
        progresso[m.id] = { item: m, tempo: tempo, timestamp: Date.now() };
        localStorage.setItem('cinetek_progresso', JSON.stringify(progresso));
    }

    function renderContinuar() {
        const lista = JSON.parse(localStorage.getItem('cinetek_progresso') || '{}');
        const container = document.getElementById('grid-continuar');
        const section = document.getElementById('section-continuar');
        const itens = Object.values(lista).sort((a, b) => b.timestamp - a.timestamp).slice(0, 4);
        
        if (itens.length > 0 && container && section) {
            section.style.display = 'block';
            container.innerHTML = "";
            itens.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${p.item.poster_path}"><p>▶ ${p.item.title || p.item.name}</p>`;
                
                card.onclick = async () => {
                    await abrirDet(p.item); 
                    
                    const v = document.getElementById('main-video');
                    const pBox = document.getElementById('player-box');

                    if(!p.item.name) {
                        v.src = db.movie[p.item.id].link;
                        pBox.style.display = 'block';
                        document.getElementById('btn-play-trigger').style.display = 'none';
                    }

                    v.onloadedmetadata = () => {
                        v.currentTime = p.tempo;
                        v.play();
                    };
                };
                container.appendChild(card);
            });
        }
    }

    function login() {
        if(document.getElementById('adm-user').value === db.config.user && document.getElementById('adm-pass').value === db.config.pass) {
            document.getElementById('adm-login-area').style.display = 'none'; document.getElementById('adm-painel').style.display = 'block';
            atualizarListaRemover();
        } else alert("Erro!");
    }

    async function salvar() {
    try {
        const link = document.getElementById('ed-link').value;
        
        // Verifica se selecionou o filme na lista de busca
        if (!selecionado) {
            return alert("Por favor, pesquise o filme e clique no nome dele na lista antes de publicar!");
        }

        if (!link) {
            return alert("Insira o link do vídeo!");
        }

        const tipo = selecionado.name ? 'tv' : 'movie';

        // Garante que as pastas existam no banco de dados
        if (!db[tipo]) db[tipo] = {};
        if (!db.recentes) db.recentes = [];

        if (tipo === 'tv') {
            const temp = document.getElementById('adm-temp').value || "1";
            const ep = document.getElementById('adm-ep').value || "1";
            
            if (!db.tv[selecionado.id]) {
                db.tv[selecionado.id] = { ...selecionado, temporadas: {} };
            }
            if (!db.tv[selecionado.id].temporadas) {
                db.tv[selecionado.id].temporadas = {};
            }
            if (!db.tv[selecionado.id].temporadas[temp]) {
                db.tv[selecionado.id].temporadas[temp] = {};
            }
            db.tv[selecionado.id].temporadas[temp][ep] = link;
        } else {
            // Salva Filme
            db.movie[selecionado.id] = { ...selecionado, link: link };
        }

        // Verifica se o item já está nos recentes de forma segura
        const jaExiste = db.recentes.some(x => x.id == selecionado.id);
        if (!jaExiste) {
            db.recentes.unshift(selecionado);
        }

        // Envia para o Firebase
        await salvarNaNuvem();
        
        alert("🚀 PUBLICADO COM SUCESSO!");
        
        // Limpa o campo e atualiza a lista
        document.getElementById('ed-link').value = "";
        atualizarListaRemover();

    } catch (erro) {
        console.error("Erro ao salvar:", erro);
        alert("Ocorreu um erro interno. Verifique o console.");
    }
}

    function toggleMenu(s) { document.getElementById('menu-lat').classList.toggle('active', s); }
    function fecharDet() { document.getElementById('detalhes-page').style.display = 'none'; document.getElementById('main-video').src = ""; renderContinuar(); }
    function abrirAdmin() { document.getElementById('admin-modal').style.display = 'block'; }
    function fecharAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
    
    function setTipo(t) { 
        tipoAtual = t; 
        document.getElementById('btn-m').style.background = t=='movie'?'var(--red)':'#333'; 
        document.getElementById('btn-t').style.background = t=='tv'?'var(--red)':'#333'; 
        document.getElementById('campos-serie').style.display = t=='tv'?'flex':'none';
    }
    
    async function buscarTMDB() {
        const q = document.getElementById('adm-busca').value;
        if(q.length < 2) return;
        const r = await fetch(`https://api.themoviedb.org/3/search/${tipoAtual}?api_key=${API_KEY}&query=${q}&language=pt-BR`);
        const d = await r.json();
        document.getElementById('res-busca-adm').innerHTML = d.results.map(m => `
            <div onclick='selecionado=${JSON.stringify(m).replace(/'/g, "")}; document.getElementById("adm-busca").value="${m.title || m.name}"; document.getElementById("res-busca-adm").innerHTML=""' 
                 style="padding:12px; cursor:pointer; border-bottom:1px solid #222; font-size:13px; color:#eee;">
                 ${m.title || m.name} (${(m.release_date || m.first_air_date || "").substring(0,4)})
            </div>
        `).join('');
    }

    async function pesquisaGeral() {
        const q = document.getElementById('home-search').value;
        const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=pt-BR`);
        const d = await r.json(); render(d.results, 'main-grid');
    }

    async function buscarGen(id, tipo) {
        toggleMenu(false);
        let url = id === 0 ? `https://api.themoviedb.org/3/trending/${tipo}/week?api_key=${API_KEY}&language=pt-BR` : `https://api.themoviedb.org/3/discover/${tipo}?api_key=${API_KEY}&with_genres=${id}&language=pt-BR`;
        const r = await fetch(url); const d = await r.json(); render(d.results, 'main-grid');
    }

    function atualizarListaRemover() {
        const listaDiv = document.getElementById('lista-gerenciar');
        const filmes = Object.values(db.movie || {});
        const series = Object.values(db.tv || {});
        const todos = [...filmes, ...series];
        listaDiv.innerHTML = todos.length === 0 ? '<p style="font-size:12px; color:#555; text-align:center;">Nenhum item.</p>' : todos.map(m => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#1a1a1a; padding:10px; border-radius:5px; margin-bottom:5px;">
                <span style="font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60%;">${m.title || m.name}</span>
                <div style="display:flex; gap:10px;">
                    <button onclick="prepararEdicao('${m.id}', '${m.name ? 'tv' : 'movie'}')" style="background:none; border:none; color:#00d4ff; cursor:pointer; font-weight:bold; font-size:14px;">✏️</button>
                    <button onclick="removerItem('${m.id}', '${m.name ? 'tv' : 'movie'}')" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; font-size:14px;">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    async function removerItem(id, tipo) {
        if(confirm("Remover?")) { delete db[tipo][id]; db.recentes = db.recentes.filter(x => x.id != id); await salvarNaNuvem(); atualizarListaRemover(); render(db.recentes, 'grid-recentes'); }
    }

    function prepararEdicao(id, tipo) {
        const item = db[tipo][id]; if(!item) return; selecionado = item; setTipo(tipo);
        document.getElementById('adm-busca').value = item.title || item.name;
        if(tipo === 'movie') { document.getElementById('ed-link').value = item.link || ""; }
        else { document.getElementById('ed-link').value = ""; document.getElementById('adm-temp').value = ""; document.getElementById('adm-ep').value = ""; }
        document.querySelector('.admin-box').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function carregarLinkEdicao() {
        if (!selecionado || !selecionado.name) return;
        const t = document.getElementById('adm-temp').value;
        const e = document.getElementById('adm-ep').value;
        if (t !== "" && e !== "" && selecionado.temporadas && selecionado.temporadas[t] && selecionado.temporadas[t][e]) {
            document.getElementById('ed-link').value = selecionado.temporadas[t][e];
        } else { document.getElementById('ed-link').value = ""; }
    }

    function toggleTrocarSenha() { const area = document.getElementById('area-trocar-senha'); area.style.display = area.style.display === 'none' ? 'block' : 'none'; }
    async function confirmarTrocaSenha() {
        const novaSenha = document.getElementById('nova-senha-input').value;
        if (novaSenha.length < 4) return alert("Mínimo 4 caracteres");
        if (confirm("Mudar senha?")) { db.config.pass = novaSenha; await salvarNaNuvem(); alert("Senha alterada!"); toggleTrocarSenha(); }
    }

    init();
</script>
</body>
</html>
